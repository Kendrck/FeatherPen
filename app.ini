[System]
# 运行模式 0=智能双模离线适配 1=商业化联网模式（预留废弃）
run_mode = 0
# 软件底层标识（禁止修改）
soft_name = FeatherPen
# 软件展示名称
soft_cn_name = 羽笔
# 软件版本号
soft_version = 1.0.0
# 旧数据库兼容密钥
db_secret_key = FeatherPen2026Secret2026

[Path]
# 小说工程数据根目录
book_root_path = book
# 用户全局配置文件路径
user_config_path = book/User/user_setting.json

[model_core]
# 三模型切换字段：cloud_api / local_api / local_file
run_mode = local_api

[local_api]
# 本地LM Studio接口地址
base_url = http://127.0.0.1:1234/v1
# 本地加载模型名称
model_name = qwen2.5-14b-instruct-1m
# 生成随机性参数
temperature = 0.7
# 上下文窗口大小
context_len = 8192
# 本地接口默认密钥
api_key = local-api-default-key

[cloud_api]
# 云端模型接口配置（自行填写启用）
base_url = ""
api_key = ""
model_name = ""
timeout = 120

[local_file]
# 本地GGUF裸模型配置（填写路径启用离线裸跑）
gguf_path = ""
ctx_len = 8192
threads = 8
n_gpu_layers = 20

[model_common]
# 全局统一生成温度
temperature = 0.7
# 单次生成最大Token数
max_tokens = 4000
# 采样参数，避免内容重复
top_p = 0.9

[SignIn]
# 超级管理员账号密码
super_account = 00000000
super_password = Administrator
# 扫码登录开关（永久关闭）
qr_login_switch = 0
# 登录历史记忆开关
login_history_save = 1

[Point]
# 每日签到积分（仅特权在线账号可用）
daily_sign_point = 100
# 广告积分（预留字段）
ad_reward_point = 50
# 付费充值总开关（永久关闭）
recharge_switch = 0

[database]
# 本地数据库文件名
db_path = featherpen.db
# 登录历史记录存储开关
login_history_record = 1

[crypto]
# 数据加密密钥
aes_key = FeatherPen20260719
