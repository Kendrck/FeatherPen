# FeatherPen V1.0.0 全局系统配置文件
# 非法参数自动回滚默认值，所有配置项配套业务注释
system:
  run_mode: 0
  soft_name: "FeatherPen"
  soft_cn_name: "羽笔"
  soft_version: "1.0.0"
  db_secret_key: "FeatherPen2026Secret2026"
  yesapi_app_key: ""
  yesapi_app_secret: ""

# 登录与测试账号体系配置
signin:
  yesapi_enable: 1
  # 全局测试账号总开关，控制登录页10个快捷按钮展示
  test_account_enable: true
  # Lv9不朽账号默认积分豁免开关状态
  lv9_skip_point_default: true

# 积分奖励、扣费配置
point:
  daily_sign_point: 100
  ad_reward_point: 50

# 后台监控、快照、日志清理配置
monitor:
  ai_monitor_refresh_sec: 1
  hardware_monitor_refresh_sec: 5
  progress_snapshot_sec: 30
  log_keep_days: 7