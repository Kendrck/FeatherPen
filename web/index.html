<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeatherPen 羽笔 V1.0.0</title>
    <style>
        /* --- 全局样式 (Main.css 内联) --- */
        :root {
            --bg-color: #1e1e2e;
            --panel-color: #252537;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --accent-color: #89b4fa;
            --success-color: #a6e3a1;
            --danger-color: #f38ba8;
            --border-radius: 8px;
            --font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            display: flex;
            overflow: hidden;
            user-select: none; /* 禁止选中文本，模拟原生应用体验 */
        }

        /* --- 布局 --- */
        #app {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background-color: var(--panel-color);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #313244;
        }

        .logo-area {
            padding: 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
            border-bottom: 1px solid #313244;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-secondary);
        }

        .nav-item:hover, .nav-item.active {
            background-color: #313244;
            color: var(--text-primary);
            border-left: 3px solid var(--accent-color);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        .page {
            display: none; /* 默认隐藏 */
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block; /* 激活显示 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 组件样式 --- */
        .card {
            background-color: var(--panel-color);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 { margin-top: 0; color: var(--accent-color); font-size: 1.4rem; }
        
        input, button {
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #45475a;
            background-color: #313244;
            color: var(--text-primary);
            font-size: 0.9rem;
            margin: 5px 0;
        }

        input:focus { outline: 2px solid var(--accent-color); border-color: transparent; }

        button {
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button.primary { background-color: var(--accent-color); color: #111; border: none; }
        button.danger { background-color: var(--danger-color); color: #111; border: none; }

        /* 监控仪表盘 */
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .monitor-item {
            background: #313244;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .monitor-value { font-size: 1.5rem; font-weight: bold; color: var(--success-color); }
        .monitor-label { font-size: 0.8rem; color: var(--text-secondary); }

        /* 登录页居中 */
        #login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .login-box { width: 300px; text-align: center; }

    </style>
</head>
<body>

<div id="app">
    <!-- 侧边栏导航 -->
    <div class="sidebar" id="sidebar" style="display: none;">
        <div class="logo-area">FeatherPen 羽笔</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="navTo('workbench')">📝 创作工作台</li>
            <li class="nav-item" onclick="navTo('member')">👑 会员中心 (Lv9)</li>
            <li class="nav-item" onclick="navTo('monitor')">📊 系统监控</li>
            <li class="nav-item" onclick="navTo('settings')">⚙️ 模型设置</li>
            <li class="nav-item" onclick="logout()" style="margin-top: auto; color: var(--danger-color);">🚪 退出登录</li>
        </ul>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        
        <!-- 1. 登录页 -->
        <div id="login-page" class="page active">
            <div class="login-box card">
                <h2>本地离线登录</h2>
                <p style="color: var(--text-secondary); font-size: 0.8rem;">V1.0.0 纯离线模式，无网络请求</p>
                <input type="text" id="uid" placeholder="请输入6位UID (如: 900009)" maxlength="6">
                <input type="password" id="pwd" placeholder="密码 (默认: admin)">
                <button class="primary" style="width: 100%; margin-top: 10px;" onclick="handleLogin()">进入系统</button>
                <div id="login-msg" style="margin-top: 10px; color: var(--danger-color); font-size: 0.8rem;"></div>
            </div>
        </div>

        <!-- 2. 工作台 (Workbench) -->
        <div id="workbench" class="page">
            <div class="card">
                <h2>📝 五级世界树工作台</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" placeholder="章节名称..." style="flex: 1;">
                    <button class="primary">生成大纲</button>
                    <button class="primary">生成正文</button>
                </div>
                <textarea style="width: 100%; height: 400px; background: #181825; border: 1px solid #45475a; color: #cdd6f4; padding: 10px; border-radius: 6px; resize: none;" placeholder="在此输入或生成内容..."></textarea>
                <div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-secondary);">
                    当前状态：本地离线生成 | 积分扣除：2点/次
                </div>
            </div>
        </div>

        <!-- 3. 会员中心 (Member) -->
        <div id="member" class="page">
            <div class="card">
                <h2>👑 Lv9 特权控制中心</h2>
                <p>当前账户积分：<span style="color: var(--success-color); font-weight: bold;">999,999,999</span></p>
                <hr style="border-color: #45475a;">
                
                <div style="margin: 15px 0; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight: bold;">积分扣除豁免</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">开启后生成内容不消耗积分</div>
                    </div>
                    <button class="primary" onclick="toggleSkipPoint(true)">开启豁免</button>
                </div>

                <div style="margin: 15px 0; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight: bold; color: var(--danger-color);">亿级压测模式</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">解除单章5小节限制 (高风险)</div>
                    </div>
                    <button class="danger" onclick="togglePressure(true)">解锁压测</button>
                </div>
            </div>
        </div>

        <!-- 4. 系统监控 (Monitor) -->
        <div id="monitor" class="page">
            <div class="card">
                <h2>📊 五维硬件监控</h2>
                <div class="monitor-grid">
                    <div class="monitor-item">
                        <div class="monitor-value" id="val-tok">0</div>
                        <div class="monitor-label">TOK 流量</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-value" id="val-ai">0%</div>
                        <div class="monitor-label">AI 进度</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-value" id="val-cpu">0%</div>
                        <div class="monitor-label">CPU 占用</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-value" id="val-gpu">0%</div>
                        <div class="monitor-label">GPU 占用</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-value" id="val-mem">0%</div>
                        <div class="monitor-label">内存占用</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5. 设置页 (Settings) -->
        <div id="settings" class="page">
            <div class="card">
                <h2>⚙️ 模型配置</h2>
                <div style="margin-bottom: 10px;">
                    <label style="display:block; margin-bottom:5px; color: var(--text-secondary);">本地推理地址</label>
                    <input type="text" value="http://127.0.0.1:1234/v1" style="width: 100%;" disabled>
                </div>
                <div style="margin-bottom: 10px;">
                    <label style="display:block; margin-bottom:5px; color: var(--text-secondary);">模型名称</label>
                    <input type="text" value="qwen2.5-14b-instruct-1m" style="width: 100%;">
                </div>
                <button class="primary">保存配置</button>
            </div>
        </div>

    </div>
</div>

<script>
    // --- 前端原生JS逻辑 (api_client.js 内联) ---
    
    const API_BASE = "http://127.0.0.1:8080";
    let currentUser = null;

    // 1. 登录处理
    async function handleLogin() {
        const uid = document.getElementById('uid').value;
        const pwd = document.getElementById('pwd').value;
        const msgBox = document.getElementById('login-msg');

        if(uid.length !== 6) {
            msgBox.innerText = "UID必须是6位数字";
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/api/v1/local/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ uid: uid, password: pwd })
            });
            
            const data = await res.json();
            
            if (res.ok) {
                currentUser = data;
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('sidebar').style.display = 'flex';
                navTo('workbench');
                startMonitorLoop(); // 登录后启动监控
            } else {
                msgBox.innerText = data.detail || "登录失败";
            }
        } catch (e) {
            msgBox.innerText = "无法连接到后端服务，请检查Python是否启动";
            console.error(e);
        }
    }

    // 2. 页面导航
    function navTo(pageId) {
        // 隐藏所有页面
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        // 显示目标页面
        document.getElementById(pageId).classList.add('active');
        
        // 高亮菜单 (简单匹配)
        const navItems = document.querySelectorAll('.nav-item');
        if(pageId === 'workbench') navItems[0].classList.add('active');
        if(pageId === 'member') navItems[1].classList.add('active');
        if(pageId === 'monitor') navItems[2].classList.add('active');
        if(pageId === 'settings') navItems[3].classList.add('active');
    }

    // 3. Lv9 特权操作
    async function toggleSkipPoint(enable) {
        if(!confirm(`确定要${enable ? '开启' : '关闭'}积分豁免吗？`)) return;
        await fetch(`${API_BASE}/api/v1/local/toggle_skip_point`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enable_skip: enable })
        });
        alert("设置已更新 (本地配置文件)");
    }

    async function togglePressure(enable) {
        if(!confirm(`确定要${enable ? '解锁' : '关闭'}压测模式吗？`)) return;
        await fetch(`${API_BASE}/api/v1/local/toggle_pressure`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enable_pressure: enable })
        });
        alert("压测模式已切换");
    }

    function logout() {
        location.reload();
    }

    // 4. 监控循环 (模拟数据，实际应请求后端监控接口)
    async function startMonitorLoop() {
        // 这里应该调用真实的监控接口，例如 /api/v1/monitor/status
        // 为了演示UI，这里使用随机数模拟
        setInterval(() => {
            document.getElementById('val-cpu').innerText = Math.floor(Math.random() * 30 + 10) + "%";
            document.getElementById('val-mem').innerText = Math.floor(Math.random() * 20 + 40) + "%";
            document.getElementById('val-gpu').innerText = Math.floor(Math.random() * 10) + "%";
            document.getElementById('val-tok').innerText = Math.floor(Math.random() * 500);
        }, 2000);
    }

</script>

</body>
</html>
